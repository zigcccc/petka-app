packages:
  - '**'

allowBuilds:
  '@sentry/cli': true
  esbuild: true
  msgpackr-extract: true

ignoredBuiltDependencies:
  - unrs-resolver

minimumReleaseAgeExclude:
  - fast-xml-parser@5.9.0
  - '@expo/cli@56.1.17'
  - '@expo/config-plugins@56.0.10'
  - '@expo/config-types@56.0.7'
  - '@expo/inline-modules@0.0.12'
  - '@expo/prebuild-config@56.0.17'
  - expo-font@56.0.7
  - expo-modules-autolinking@56.0.17
  - expo-modules-core@56.0.18
  - expo-modules-jsi@56.0.10
  - expo@56.0.13
  - '@expo/ui@56.0.19'
  - expo-build-properties@56.0.20
  - expo-notifications@56.0.18 || 56.0.19
  - expo-router@56.2.12
  - posthog-react-native@4.53.3
  - '@expo/config@56.0.10'
  - '@expo/fingerprint@0.19.5'
  - '@expo/log-box@56.0.14'
  - '@expo/metro-config@56.0.15'
  - '@expo/router-server@56.0.15'
  - babel-preset-expo@56.0.16
  - expo-asset@56.0.18
  - expo-constants@56.0.19
  - '@expo/dom-webview@56.0.6'
  - '@expo/metro-runtime@56.0.16'
  - expo-dev-client@56.0.21
  - expo-dev-launcher@56.0.21
  - expo-dev-menu@56.0.18
  - expo-splash-screen@56.0.11
  - expo-updates@56.0.20

nodeLinker: hoisted

onlyBuiltDependencies:
  - '@sentry/cli'
  - esbuild
  - posthog-react-native
  - react-native-mmkv
  - react-native-nitro-modules
  - dtrace-provider
