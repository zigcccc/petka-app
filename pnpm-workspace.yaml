packages:
  - '**'

allowBuilds:
  '@sentry/cli': true
  esbuild: true
  msgpackr-extract: true

ignoredBuiltDependencies:
  - unrs-resolver

minimumReleaseAgeExclude:
  - '@posthog/core@1.31.1'
  - '@posthog/types@1.384.1'
  - convex@1.41.0
  - posthog-react-native@4.46.25

nodeLinker: hoisted

onlyBuiltDependencies:
  - '@sentry/cli'
  - esbuild
  - posthog-react-native
  - react-native-mmkv
  - react-native-nitro-modules
  - dtrace-provider
